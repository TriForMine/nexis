name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      sdk_ts: ${{ steps.filter.outputs.sdk_ts }}
      control_api: ${{ steps.filter.outputs.control_api }}
      docs_site: ${{ steps.filter.outputs.docs_site }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'server/**'
              - 'plugins/rust/**'
              - 'examples/wasm-plugins/**'
            sdk_ts:
              - 'sdks/ts/**'
            control_api:
              - 'dashboard/control-api/**'
            docs_site:
              - 'docs-site/**'
              - 'docs/**'
              - 'README.md'
            compose:
              - 'infra/**'
              - 'server/**'
              - 'dashboard/**'
              - 'examples/**'
              - 'sdks/ts/**'
              - 'plugins/**'
              - '.github/workflows/ci.yml'

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.89.0
      - name: Cargo test
        working-directory: server
        run: cargo test

  sdk-ts:
    needs: changes
    if: needs.changes.outputs.sdk_ts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install
        working-directory: sdks/ts
        run: bun install --frozen-lockfile
      - name: Test
        working-directory: sdks/ts
        run: bun test
      - name: Typecheck
        working-directory: sdks/ts
        run: bunx tsc -p tsconfig.json --noEmit

  control-api:
    needs: changes
    if: needs.changes.outputs.control_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install
        working-directory: dashboard/control-api
        run: bun install --frozen-lockfile
      - name: Typecheck
        working-directory: dashboard/control-api
        run: bunx tsc --noEmit
      - name: Test
        working-directory: dashboard/control-api
        run: bun test

  compose-smoke:
    needs: changes
    if: needs.changes.outputs.compose == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Start stack
        env:
          NEXIS_SESSION_TTL_SECONDS: "5"
        run: docker compose -f infra/docker-compose.yml up -d --build --wait postgres control-api rust-server
      - name: Run smoke
        env:
          NEXIS_SESSION_TTL_SECONDS: "5"
        run: bun infra/smoke.ts
      - name: Logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --no-color
      - name: Teardown
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v

  docs-site:
    needs: changes
    if: needs.changes.outputs.docs_site == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install
        working-directory: docs-site
        run: bun install --frozen-lockfile
      - name: Build
        working-directory: docs-site
        run: bun run build

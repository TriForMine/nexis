<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Nexis Counter Demo</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: linear-gradient(135deg, #f8f4e6 0%, #d6efe8 100%);
                font-family: "Space Grotesk", "Segoe UI", sans-serif;
            }
            .panel {
                width: min(520px, 92vw);
                background: rgba(255, 255, 255, 0.94);
                border: 1px solid #d4d9d4;
                border-radius: 18px;
                padding: 20px;
                box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
            }
            h1 {
                margin: 0 0 12px;
            }
            label {
                font-size: 12px;
                color: #5a615b;
                display: block;
                margin-bottom: 6px;
            }
            input,
            button {
                width: 100%;
                margin-bottom: 10px;
                padding: 10px;
                border-radius: 10px;
                border: 1px solid #cfd8ce;
                font: inherit;
            }
            button {
                cursor: pointer;
                background: #0f766e;
                color: #fff;
                border: none;
                font-weight: 700;
            }
            #counter {
                font-size: 52px;
                text-align: center;
                margin: 14px 0;
            }
            pre {
                background: #0f172a;
                color: #e2f0ff;
                border-radius: 10px;
                padding: 12px;
                min-height: 120px;
                overflow: auto;
            }
        </style>
    </head>
    <body>
        <div class="panel">
            <h1>Nexis Counter Room</h1>

            <label>WS URL</label>
            <input id="wsUrl" value="ws://localhost:4000" />

            <label
                >Project ID (auto-filled from token, optional in anonymous
                mode)</label
            >
            <input id="projectId" value="demo-project" />

            <label
                >Client Token (optional when auth mode is
                optional/disabled)</label
            >
            <input
                id="token"
                placeholder="Paste token from control API (or leave empty)"
            />

            <button id="connect">Connect + Join Counter Room</button>

            <div id="counter">0</div>
            <button id="inc" disabled>Increment</button>
            <button id="listRooms" disabled>List Counter Rooms</button>
            <button id="enqueueMatch" disabled>Enqueue Match (1v1)</button>
            <button id="dequeueMatch" disabled>Dequeue Match</button>

            <pre id="log"></pre>
        </div>

        <script type="module" src="./src/app.ts"></script>
    </body>
</html>
